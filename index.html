<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Cookie</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        button { cursor: pointer; padding: 5px 10px; }
    </style>
</head>
<body>

    <h1>Gestiune Cookie-uri</h1>

    <div class="section">
        <h3>1. Cookie Simplu</h3>
        <button onclick="createSimpleCookie()">Set test2=triple</button>
    </div>

    <div class="section">
        <h3>2. Toate Cookie-urile</h3>
        <button onclick="showAllCookies()">Afișează document.cookie</button>
        <p id="cookieDisplay" style="color: blue;"></p>
    </div>

    <div class="section">
        <h3>3. Cookie specific</h3>
        <input type="text" id="cookieName" placeholder="Nume cookie (ex: session)">
        <button onclick="getSpecificCookie()">Caută</button>
    </div>

    <div class="section">
        <h3>4. Ștergere Cookie</h3>
        <button onclick="deleteCookie()">Șterge 'test2' de tot</button>
    </div>

    <script>
        // A. Creare - Am adaugat path=/ pentru a fi usor de gasit/sters
        function createSimpleCookie() {
            // MODIFICARE: Adăugat path=/
            document.cookie = "test2=triple; path=/"; 
            alert("Cookie 'test2' a fost creat!");
        }

        // B. Afișare
        function showAllCookies() {
            const allCookies = document.cookie;
            document.getElementById('cookieDisplay').innerText = allCookies || "Niciun cookie găsit.";
        }

        // C. Căutare
        function getSpecificCookie() {
            const name = document.getElementById('cookieName').value;
            const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
            if (match) {
                alert("Valoarea pentru " + name + " este: " + match[2]);
            } else {
                alert("Cookie-ul nu a fost găsit.");
            }
        }

        // D. Ștergere - Folosim metoda max-age=0 care este mai sigură
        function deleteCookie() {
            // MODIFICARE: Folosim max-age=0 și același path ca la creare
            document.cookie = "test2=; max-age=0; path=/"; 
            alert("Cookie 'test2' a fost eliminat definitiv!");
        }

        // E. Exemplu avansat
        document.cookie = "do_something_only_once=true; expires=Fri, 31 Dec 9999 23:59:59 GMT; path=/; SameSite=Lax";
    </script>

</body>
</html>
